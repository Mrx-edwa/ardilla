    <style>
    /* Estilos base optimizados */
    body {
        background-color: #fff;

        letter-spacing: -0.015em; /* tracking-tight */
    }

    .transition-all-slow {
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .shadow-soft {
        box-shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.1);
    }

    .shadow-hover {
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15);
    }

    .glass {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        background-color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .img-cover {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .img-contain {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .parallax {
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
    }

    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
    }

    @keyframes wiggle {
        0%, 100% { transform: rotate(-3deg); }
        50% { transform: rotate(3deg); }
    }

    .animate-wiggle {
        animation: wiggle 1s ease-in-out infinite;
    }

    .wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        overflow: hidden;
        line-height: 0;
    }

    .wave svg {
        position: relative;
        display: block;
        width: calc(100% + 1.3px);
        height: 150px;
    }

    .wave .shape-fill {
        fill: #FFFFFF;
    }

    .mobile-menu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.5s cubic-bezier(0.77, 0.2, 0.05, 1);
    }

    .mobile-menu.open .skeleton {
        background-color: #e5e7eb; 
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .skeleton {
        background-color: #e5e7eb;
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .product-card {
        perspective: 1000px;
    }

    .product-inner {
        transition: transform 0.6s;
        transform-style: preserve-3d;
    }

    .product-card:hover .product-inner {
        transform: rotateY(10deg);
    }

    .neon-effect {
        text-shadow: 0 0 5px rgba(255, 182, 193, 0.5), 0 0 10px rgba(255, 182, 193, 0.3);
    }

    .gradient-animate {
        background-size: 200% 200%;

    }

    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
